    <path d="M622 456C652 435 681 426 711 429 685 446 658 458 629 466Z" fill="url(#stain)" opacity=".6"/>
    <path d="M497 523C480 552 458 572 431 586 446 557 465 535 490 518Z" fill="url(#stain)" opacity=".48"/>
    <path d="M553 540C563 568 561 593 548 616 538 588 537 563 545 541Z" fill="url(#stain)" opacity=".44"/>
