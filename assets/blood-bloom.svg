<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" aria-hidden="true">
  <defs>
    <radialGradient id="wash" cx="45%" cy="42%" r="64%">
      <stop offset="0" stop-color="#db2d45" stop-opacity=".82"/>
      <stop offset=".58" stop-color="#a80f29" stop-opacity=".72"/>
      <stop offset="1" stop-color="#68101f" stop-opacity=".54"/>
    </radialGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e64c5f"/>
      <stop offset=".5" stop-color="#b51230"/>
      <stop offset="1" stop-color="#750d20"/>
    </linearGradient>
    <filter id="soft" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- 左上：留有呼吸感的主花，花瓣不闭合，避免形成厚重血块。 -->
  <g transform="translate(150 176) rotate(-14)">
    <ellipse cx="2" cy="3" rx="72" ry="61" fill="url(#wash)" opacity=".12" filter="url(#soft)"/>
    <g fill="url(#petal)" opacity=".78">
      <path d="M-8 2C-34-35-29-76 1-111 21-73 25-35-8 2Z"/>
      <path d="M5-3C20-43 55-68 95-72 77-34 49-8 5-3Z" opacity=".84"/>
      <path d="M10 8C46-3 83 10 109 42 69 48 34 37 10 8Z" opacity=".68"/>
      <path d="M2 15C31 39 40 76 24 111-2 83-12 48 2 15Z" opacity=".72"/>
      <path d="M-12 13C-34 46-70 61-105 51-78 21-47 7-12 13Z" opacity=".63"/>
      <path d="M-16 1C-57 7-89-9-108-41-69-42-36-29-16 1Z" opacity=".69"/>
    </g>
    <path d="M-18-5C-6-20 10-22 23-8 32 2 26 18 12 24-5 31-26 18-28 4-1-5 7-9 12-13 16-5 5 8-1 8-6 12-14 6-17-3Z" fill="#8f1026" opacity=".74"/>
    <g fill="#b31431" opacity=".66">
      <circle cx="-91" cy="-88" r="5"/><circle cx="119" cy="-20" r="4"/>
      <ellipse cx="83" cy="91" rx="4" ry="10" transform="rotate(-34 83 91)"/>
      <circle cx="-72" cy="93" r="3.5"/><circle cx="21" cy="-130" r="3"/>
    </g>
  </g>

  <!-- 右下：更轻、更疏的侧向绽放。 -->
  <g transform="translate(579 500) rotate(18) scale(.82)">
    <ellipse cx="0" cy="0" rx="66" ry="52" fill="url(#wash)" opacity=".1" filter="url(#soft)"/>
    <g fill="url(#petal)" opacity=".66">
      <path d="M-5 1C-24-29-16-65 10-91 24-57 22-24-5 1Z"/>
      <path d="M8-4C28-31 61-44 91-34 65-8 38 2 8-4Z" opacity=".78"/>
      <path d="M9 8C42 10 68 31 79 62 47 54 22 36 9 8Z" opacity=".7"/>
      <path d="M-2 12C16 37 13 69-5 94-24 65-25 37-2 12Z" opacity=".6"/>
      <path d="M-12 8C-40 28-72 28-96 10-64-5-37-6-12 8Z" opacity=".7"/>
    </g>
    <circle cx="-4" cy="2" r="17" fill="#941026" opacity=".58"/>
    <g fill="#a90f2a" opacity=".58">
      <circle cx="102" cy="37" r="4"/><circle cx="-84" cy="-53" r="5"/>
      <ellipse cx="45" cy="-94" rx="3.5" ry="9" transform="rotate(24 45 -94)"/>
      <circle cx="-53" cy="95" r="3"/>
    </g>
  </g>

  <!-- 散落的花瓣与血滴，让纹理像风吹散而不是规则贴花。 -->
  <g fill="url(#petal)" opacity=".48">
    <path d="M326 612C311 578 319 548 344 529 354 562 349 590 326 612Z"/>
    <path d="M382 655C403 626 431 617 459 627 438 650 413 660 382 655Z" opacity=".72"/>
    <path d="M484 126C496 97 521 81 548 83 534 110 513 126 484 126Z" opacity=".62"/>
    <path d="M643 206C665 188 690 188 710 203 686 216 664 217 643 206Z" opacity=".56"/>
  </g>
  <g fill="#a7112b" opacity=".46">
    <circle cx="303" cy="105" r="5"/><circle cx="397" cy="278" r="3"/>
    <circle cx="671" cy="372" r="4.5"/><circle cx="485" cy="694" r="3.5"/>
    <circle cx="69" cy="518" r="4"/><circle cx="214" cy="676" r="2.5"/>
    <ellipse cx="706" cy="638" rx="3" ry="9" transform="rotate(-28 706 638)"/>
    <ellipse cx="89" cy="339" rx="3" ry="8" transform="rotate(36 89 339)"/>
  </g>
</svg>
